services:
  db:
    restart: on-failure
    image: postgres:16.10-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-filtrex_test}
    #    command: ["postgres", "-c", "log_statement=all", "-c", "log_destination=stderr"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready --username=${POSTGRES_USER:-postgres} --dbname=${POSTGRES_DB:-filtrex_test}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
